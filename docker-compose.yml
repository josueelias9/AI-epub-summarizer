services:
  extractor:
    build: ./extractor
    container_name: extractor-container
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - epub_uploads:/app/uploads
      - epub_output:/app/output
    depends_on:
      extractor-init:
        condition: service_completed_successfully
      
  extractor-init:
    build: ./extractor
    command: bash scripts/prestart.sh
    env_file:
      - .env
    container_name: extractor-init-container
    volumes:
      - epub_uploads:/app/uploads
      - epub_output:/app/output
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: frontend-container
    ports:
      - "3000:3000"
    environment:
      - NEXT_PRIVATE_API_URL
      - NEXT_PUBLIC_API_URL
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - DB_HOST
      - DB_PORT
      - POSTGRES_DB

    # depends_on:
      # - extractor

  ollama:
    image: ollama/ollama:latest
    container_name: ollama-container
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10

  # One-shot container: pulls required models and exits.
  # Re-runs are instant because models are cached in ollama_data volume.
  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=${LLM_HOST}
    entrypoint: ["/bin/sh", "-c", "ollama pull ${LLM_MODEL} && ollama pull ${EMBEDDING_MODEL}"]
    restart: "no"


  
  db:
    image: postgres
    container_name: db-container
    restart: always
    # set shared memory limit when using docker compose
    shm_size: 128mb
    # or set shared memory limit when deploy via swarm stack
    #volumes:
    #  - type: tmpfs
    #    target: /dev/shm
    #    tmpfs:
    #      size: 134217728 # 128*2^20 bytes = 128Mb
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin4:
    image: dpage/pgadmin4
    ports:
      - 80:80
    container_name: pgadmin4-container
    volumes:
      # https://www.pgadmin.org/docs/pgadmin4/latest/container_deployment.html
      - pgadmin_storage:/var/lib/pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL
      - PGADMIN_DEFAULT_PASSWORD


volumes:
  pgadmin_storage:
  ollama_data:
  epub_uploads:
  epub_output:
